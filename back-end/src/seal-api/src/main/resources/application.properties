spring.application.name=seal-hackathon

# Load local secrets from a gitignored .env (key=value, properties format) if present.
# Keys here (GOOGLE_CLIENT_ID, MAIL_PASSWORD, ...) fill the ${...} placeholders below.
spring.config.import=optional:file:./.env[.properties]

# =============================================
# DATABASE
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/seal_hackathon?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:TrangNhi2004}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Preserve exact @Table / @Column names (DB uses PascalCase: User, HackathonEvent, ...)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# =============================================
# JWT
# =============================================
# Secret must be Base64-encoded, at least 256 bits (32 bytes)
app.jwt.secret=${JWT_SECRET:3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}
# 24 hours in milliseconds
app.jwt.expiration-ms=86400000
# 7 days in milliseconds
app.jwt.refresh-expiration-ms=604800000

# =============================================
# OAUTH2 - GOOGLE
# Set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET as environment variables
# or replace the placeholders below for local development only
# =============================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# =============================================
# OAUTH2 - GITHUB
# Set GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET as environment variables
# =============================================
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:your-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:your-github-client-secret}
spring.security.oauth2.client.registration.github.scope=user:email
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# =============================================
# APP CONFIG
# =============================================
# Frontend URL for OAuth2 redirect after login
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# =============================================
# OPENAPI / SWAGGER
# Visit: http://localhost:8080/swagger-ui.html
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =============================================
# SERVER
# =============================================
server.port=8080
server.error.include-message=always
# OAuth2 uses the servlet session to keep provider state between redirects.
server.servlet.session.cookie.same-site=lax

# =============================================
# FILE UPLOADS (avatars, etc.)
# Files are stored on disk under app.upload.dir and served at /uploads/**
# =============================================
app.upload.dir=${UPLOAD_DIR:uploads}
# Bumped to 20MB to allow track "đề thi" files (PDF/DOCX/ZIP with sample datasets).
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=21MB

# Track problem files ("đề thi") are access-controlled, so they live OUTSIDE the
# public app.upload.dir (which is served openly at /uploads/**). They are streamed
# only through GET /api/events/{e}/tracks/{t}/problem/download after an auth check.
app.problem.dir=${PROBLEM_DIR:protected/problems}

# =============================================
# AI — GOOGLE GEMINI (Judge Assistant)
# Set GEMINI_API_KEY in your .env (https://aistudio.google.com/app/apikey).
# Leaving it unset disables the feature gracefully (endpoint returns a clear error).
# =============================================
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
app.ai.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}

# =============================================
# MAIL / GMAIL SMTP
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.default-encoding=UTF-8
