spring.application.name=seal-hackathon

# Load local secrets from a gitignored .env (key=value, properties format) if present.
# Keys here (GOOGLE_CLIENT_ID, MAIL_PASSWORD, ...) fill the ${...} placeholders below.
spring.config.import=optional:file:./.env[.properties]

# =============================================
# DATABASE
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/seal_hackathon?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Preserve exact @Table / @Column names (DB uses PascalCase: User, HackathonEvent, ...)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# =============================================
# JWT
# =============================================
# Secret must be Base64-encoded, at least 256 bits (32 bytes)
app.jwt.secret=${JWT_SECRET:3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}
# 24 hours in milliseconds
app.jwt.expiration-ms=86400000
# 7 days in milliseconds
app.jwt.refresh-expiration-ms=604800000

# =============================================
# OAUTH2 - GOOGLE
# Set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET as environment variables
# or replace the placeholders below for local development only
# =============================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# =============================================
# OAUTH2 - GITHUB
# Set GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET as environment variables
# =============================================
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:your-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:your-github-client-secret}
spring.security.oauth2.client.registration.github.scope=user:email
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# =============================================
# APP CONFIG
# =============================================
# Frontend URL for OAuth2 redirect after login
app.frontend.url=http://localhost:5173

# =============================================
# OPENAPI / SWAGGER
# Visit: http://localhost:8080/swagger-ui.html
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =============================================
# SERVER
# =============================================
server.port=8080
server.error.include-message=always

# =============================================
# FILE UPLOADS (avatars, etc.)
# Files are stored on disk under app.upload.dir and served at /uploads/**
# =============================================
app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# =============================================
# MAIL / GMAIL SMTP
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.default-encoding=UTF-8
