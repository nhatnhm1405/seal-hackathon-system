
<style>
#erd { padding: 8px 0; }
#erd svg { max-width: 100%; }
.mermaid-fallback { display:none; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryBorderColor: dark ? '#AFA9EC' : '#534AB7',
    primaryTextColor: dark ? '#CECBF6' : '#26215C',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    secondaryBorderColor: dark ? '#5DCAA5' : '#0F6E56',
    secondaryTextColor: dark ? '#9FE1CB' : '#04342C',
    tertiaryColor: dark ? '#3B6D11' : '#EAF3DE',
    tertiaryBorderColor: dark ? '#97C459' : '#3B6D11',
    tertiaryTextColor: dark ? '#C0DD97' : '#173404',
  },
});

const diagram = `erDiagram
  USER {
    int id PK
    string email
    string password_hash
    string full_name
    string role
    string student_type
    string student_id
    string university
    string status
    datetime created_at
  }

  EVENT {
    int id PK
    string name
    string season
    int year
    string description
    string status
    datetime created_at
    int created_by FK
  }

  TRACK {
    int id PK
    int event_id FK
    string name
    string description
    int mentor_id FK
  }

  ROUND {
    int id PK
    int event_id FK
    string name
    int order_num
    datetime start_time
    datetime end_time
    datetime deadline
    int promotion_top_n
    string status
  }

  CRITERIA {
    int id PK
    int event_id FK
    string name
    string description
    float weight
    int order_num
  }

  TEAM {
    int id PK
    int event_id FK
    int track_id FK
    string name
    string status
    int leader_id FK
    datetime created_at
  }

  TEAM_MEMBER {
    int id PK
    int team_id FK
    int user_id FK
    string role
    datetime joined_at
  }

  JUDGE_ASSIGNMENT {
    int id PK
    int round_id FK
    int judge_id FK
    int track_id FK
  }

  SUBMISSION {
    int id PK
    int team_id FK
    int round_id FK
    string repo_url
    string demo_url
    string slide_url
    string status
    datetime submitted_at
    datetime updated_at
  }

  SCORE {
    int id PK
    int submission_id FK
    int judge_id FK
    int criteria_id FK
    float value
    string status
    datetime scored_at
  }

  AUDIT_LOG {
    int id PK
    int user_id FK
    string action
    string entity_type
    int entity_id
    text note
    datetime created_at
  }

  USER ||--o{ EVENT : "creates"
  EVENT ||--o{ TRACK : "has"
  EVENT ||--o{ ROUND : "has"
  EVENT ||--o{ CRITERIA : "has"
  EVENT ||--o{ TEAM : "has"
  TRACK ||--o{ TEAM : "placed in"
  USER ||--o{ TEAM : "leads"
  TEAM ||--o{ TEAM_MEMBER : "has"
  USER ||--o{ TEAM_MEMBER : "is"
  ROUND ||--o{ JUDGE_ASSIGNMENT : "has"
  USER ||--o{ JUDGE_ASSIGNMENT : "assigned as"
  TRACK ||--o{ JUDGE_ASSIGNMENT : "scoped to"
  TEAM ||--o{ SUBMISSION : "submits"
  ROUND ||--o{ SUBMISSION : "in"
  SUBMISSION ||--o{ SCORE : "receives"
  USER ||--o{ SCORE : "gives"
  CRITERIA ||--o{ SCORE : "used in"
  USER ||--o{ AUDIT_LOG : "triggers"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
