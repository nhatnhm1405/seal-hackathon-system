<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SEAL Hackathon - Track Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;700&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                            "surface-container-lowest": "#ffffff",
                            "on-secondary": "#ffffff",
                            "on-background": "#1a1b21",
                            "background": "#faf8ff",
                            "secondary-fixed-dim": "#4cd7f6",
                            "surface-container": "#eeedf4",
                            "primary-fixed": "#dce1ff",
                            "on-primary-fixed": "#00164e",
                            "inverse-surface": "#2f3036",
                            "tertiary-fixed-dim": "#ffb691",
                            "surface-container-highest": "#e3e1e9",
                            "on-tertiary": "#ffffff",
                            "on-error-container": "#93000a",
                            "on-error": "#ffffff",
                            "secondary": "#00687a",
                            "secondary-fixed": "#acedff",
                            "tertiary-fixed": "#ffdbcb",
                            "tertiary-container": "#6e2c00",
                            "surface-container-high": "#e9e7ef",
                            "tertiary": "#4b1c00",
                            "inverse-primary": "#b6c4ff",
                            "surface": "#faf8ff",
                            "secondary-container": "#57dffe",
                            "primary": "#00236f",
                            "error-container": "#ffdad6",
                            "on-tertiary-fixed-variant": "#773205",
                            "on-secondary-fixed-variant": "#004e5c",
                            "on-surface-variant": "#444651",
                            "surface-bright": "#faf8ff",
                            "on-primary": "#ffffff",
                            "on-tertiary-fixed": "#341100",
                            "surface-dim": "#dad9e1",
                            "primary-fixed-dim": "#b6c4ff",
                            "on-surface": "#1a1b21",
                            "on-primary-container": "#90a8ff",
                            "on-primary-fixed-variant": "#264191",
                            "primary-container": "#1e3a8a",
                            "error": "#ba1a1a",
                            "outline": "#757682",
                            "surface-tint": "#4059aa",
                            "inverse-on-surface": "#f1f0f7",
                            "surface-container-low": "#f4f3fa",
                            "outline-variant": "#c5c5d3",
                            "on-secondary-container": "#006172",
                            "on-secondary-fixed": "#001f26",
                            "surface-variant": "#e3e1e9",
                            "on-tertiary-container": "#f39461"
                    },
                    "borderRadius": {
                            "DEFAULT": "0.25rem",
                            "lg": "0.5rem",
                            "xl": "0.75rem",
                            "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                            "headline": ["Plus Jakarta Sans"],
                            "display": ["Plus Jakarta Sans"],
                            "body": ["Inter"],
                            "label": ["JetBrains Mono"]
                    },
                    "fontSize": {}
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen antialiased flex">
<!-- SideNavBar (Suppressed for transactional/onboarding flow) -->
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col min-h-screen pb-24 lg:pb-0 relative">
<!-- Header Section -->
<header class="pt-12 pb-8 px-4 md:px-8 max-w-7xl mx-auto w-full">
<div class="flex items-center gap-2 mb-4">
<span class="px-3 py-1 bg-surface-variant text-on-surface-variant rounded-full text-xs font-label tracking-wide uppercase font-bold border border-outline-variant">Registration</span>
<span class="px-3 py-1 bg-primary/10 text-primary rounded-full text-xs font-label tracking-wide uppercase font-bold border border-primary/20 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">stars</span>
                    Team Leader
                </span>
</div>
<h1 class="font-headline font-extrabold text-4xl md:text-5xl text-primary tracking-tight mb-4">Track Selection</h1>
<p class="text-on-surface-variant text-lg max-w-3xl leading-relaxed">
                Select your competition track for SEAL Spring 2026. This selection is final after registration. Carefully review the judging criteria for each domain before committing your team.
            </p>
</header>
<!-- Track Selection Grid -->
<div class="px-4 md:px-8 max-w-7xl mx-auto w-full flex-1 mb-24">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Card 1: Web App Innovation -->
<label class="relative block cursor-pointer group">
<input class="peer sr-only" name="track" type="radio" value="web"/>
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-6 transition-all duration-300 hover:shadow-md peer-checked:border-primary peer-checked:ring-2 peer-checked:ring-primary/20 peer-checked:shadow-sm h-full flex flex-col">
<div class="flex justify-between items-start mb-4">
<div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-3xl">public</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors">
<span class="material-symbols-outlined text-white text-[16px] opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
</div>
</div>
<h3 class="font-headline font-bold text-xl text-on-surface mb-2 group-hover:text-primary transition-colors">Web App Innovation</h3>
<p class="text-on-surface-variant text-sm flex-1 mb-6 line-clamp-3">
                            Build scalable, accessible, and performant web applications solving real-world problems. Focus on UX/UI, modern frameworks, and robust backend integrations.
                        </p>
<div class="flex items-center justify-between mt-auto pt-4 border-t border-outline-variant/50">
<span class="flex items-center gap-1.5 text-xs font-label text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]">group</span>
                                24 Teams registered
                            </span>
<a class="text-xs font-label text-primary hover:text-primary-container flex items-center gap-1 group/link" href="#">
                                Criteria Preview
                                <span class="material-symbols-outlined text-[14px] group-hover/link:translate-x-0.5 transition-transform">arrow_forward</span>
</a>
</div>
</div>
</label>
<!-- Card 2: AI & Machine Learning -->
<label class="relative block cursor-pointer group">
<input checked="" class="peer sr-only" name="track" type="radio" value="ai"/>
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-6 transition-all duration-300 hover:shadow-md peer-checked:border-primary peer-checked:ring-2 peer-checked:ring-primary/20 peer-checked:shadow-sm h-full flex flex-col">
<div class="flex justify-between items-start mb-4">
<div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-3xl">psychology</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors">
<span class="material-symbols-outlined text-white text-[16px] opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
</div>
</div>
<h3 class="font-headline font-bold text-xl text-on-surface mb-2 group-hover:text-primary transition-colors">AI &amp; Machine Learning</h3>
<p class="text-on-surface-variant text-sm flex-1 mb-6 line-clamp-3">
                            Develop intelligent systems utilizing natural language processing, computer vision, or predictive analytics. Emphasis on model accuracy, ethical AI, and practical application.
                        </p>
<div class="flex items-center justify-between mt-auto pt-4 border-t border-outline-variant/50">
<span class="flex items-center gap-1.5 text-xs font-label text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]">group</span>
                                42 Teams registered
                            </span>
<a class="text-xs font-label text-primary hover:text-primary-container flex items-center gap-1 group/link" href="#">
                                Criteria Preview
                                <span class="material-symbols-outlined text-[14px] group-hover/link:translate-x-0.5 transition-transform">arrow_forward</span>
</a>
</div>
</div>
</label>
<!-- Card 3: Education Tech -->
<label class="relative block cursor-pointer group">
<input class="peer sr-only" name="track" type="radio" value="edtech"/>
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-6 transition-all duration-300 hover:shadow-md peer-checked:border-primary peer-checked:ring-2 peer-checked:ring-primary/20 peer-checked:shadow-sm h-full flex flex-col">
<div class="flex justify-between items-start mb-4">
<div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-3xl">school</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors">
<span class="material-symbols-outlined text-white text-[16px] opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
</div>
</div>
<h3 class="font-headline font-bold text-xl text-on-surface mb-2 group-hover:text-primary transition-colors">Education Tech</h3>
<p class="text-on-surface-variant text-sm flex-1 mb-6 line-clamp-3">
                            Create tools that enhance learning experiences, improve accessibility to education, or streamline administrative academic processes.
                        </p>
<div class="flex items-center justify-between mt-auto pt-4 border-t border-outline-variant/50">
<span class="flex items-center gap-1.5 text-xs font-label text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]">group</span>
                                18 Teams registered
                            </span>
<a class="text-xs font-label text-primary hover:text-primary-container flex items-center gap-1 group/link" href="#">
                                Criteria Preview
                                <span class="material-symbols-outlined text-[14px] group-hover/link:translate-x-0.5 transition-transform">arrow_forward</span>
</a>
</div>
</div>
</label>
<!-- Card 4: Social Impact -->
<label class="relative block cursor-pointer group">
<input class="peer sr-only" name="track" type="radio" value="social"/>
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-6 transition-all duration-300 hover:shadow-md peer-checked:border-primary peer-checked:ring-2 peer-checked:ring-primary/20 peer-checked:shadow-sm h-full flex flex-col">
<div class="flex justify-between items-start mb-4">
<div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-3xl">volunteer_activism</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors">
<span class="material-symbols-outlined text-white text-[16px] opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
</div>
</div>
<h3 class="font-headline font-bold text-xl text-on-surface mb-2 group-hover:text-primary transition-colors">Social Impact</h3>
<p class="text-on-surface-variant text-sm flex-1 mb-6 line-clamp-3">
                            Design technological solutions addressing community challenges, sustainability, or civic engagement. Solutions should prioritize positive societal outcomes.
                        </p>
<div class="flex items-center justify-between mt-auto pt-4 border-t border-outline-variant/50">
<span class="flex items-center gap-1.5 text-xs font-label text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]">group</span>
                                29 Teams registered
                            </span>
<a class="text-xs font-label text-primary hover:text-primary-container flex items-center gap-1 group/link" href="#">
                                Criteria Preview
                                <span class="material-symbols-outlined text-[14px] group-hover/link:translate-x-0.5 transition-transform">arrow_forward</span>
</a>
</div>
</div>
</label>
</div>
</div>
<!-- Sticky Confirmation Bar -->
<div class="fixed bottom-0 left-0 right-0 bg-surface-container-lowest border-t border-outline-variant shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-40 transform transition-transform duration-300">
<div class="max-w-7xl mx-auto px-4 py-4 md:px-8 flex flex-col sm:flex-row items-center justify-between gap-4">
<div class="flex flex-col items-center sm:items-start">
<span class="text-xs font-label text-on-surface-variant uppercase tracking-wider mb-1">Selected Track</span>
<span class="font-headline font-bold text-lg text-primary flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]">psychology</span>
                        AI &amp; Machine Learning
                    </span>
</div>
<button class="w-full sm:w-auto bg-primary hover:bg-primary-container text-on-primary font-medium py-3 px-8 rounded-lg transition-colors flex items-center justify-center gap-2 focus:ring-2 focus:ring-offset-2 focus:ring-primary outline-none shadow-sm">
                    Register Team
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</div>
</main>
</body></html>
