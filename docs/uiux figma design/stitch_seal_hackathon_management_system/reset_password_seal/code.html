<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SEAL - Account Recovery</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff",
                        "surface-tint": "#4059aa",
                        "error-container": "#ffdad6",
                        "background": "#faf8ff",
                        "surface-container-low": "#f4f3fa",
                        "inverse-primary": "#b6c4ff",
                        "surface-container-highest": "#e3e1e9",
                        "on-tertiary-fixed": "#341100",
                        "secondary": "#00687a",
                        "secondary-container": "#57dffe",
                        "inverse-surface": "#2f3036",
                        "primary-container": "#1e3a8a",
                        "on-background": "#1a1b21",
                        "secondary-fixed-dim": "#4cd7f6",
                        "surface-dim": "#dad9e1",
                        "primary-fixed": "#dce1ff",
                        "tertiary-container": "#6e2c00",
                        "on-tertiary": "#ffffff",
                        "outline": "#757682",
                        "surface-variant": "#e3e1e9",
                        "inverse-on-surface": "#f1f0f7",
                        "primary-fixed-dim": "#b6c4ff",
                        "on-secondary-container": "#006172",
                        "error": "#ba1a1a",
                        "surface-container-high": "#e9e7ef",
                        "tertiary": "#4b1c00",
                        "surface-container": "#eeedf4",
                        "secondary-fixed": "#acedff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed": "#00164e",
                        "tertiary-fixed": "#ffdbcb",
                        "on-primary-container": "#90a8ff",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#444651",
                        "surface": "#faf8ff",
                        "on-primary-fixed-variant": "#264191",
                        "primary": "#00236f",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed": "#001f26",
                        "on-surface": "#1a1b21",
                        "on-tertiary-container": "#f39461",
                        "on-secondary-fixed-variant": "#004e5c",
                        "on-secondary": "#ffffff",
                        "outline-variant": "#c5c5d3",
                        "on-tertiary-fixed-variant": "#773205",
                        "surface-bright": "#faf8ff",
                        "tertiary-fixed-dim": "#ffb691"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["JetBrains Mono"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Suppressed TopNavBar & Footer due to Semantic Shell Mandate for Transactional Pages -->
<!-- Minimal Header for Brand Anchoring -->
<header class="w-full px-6 py-8 flex justify-center lg:justify-start max-w-7xl mx-auto absolute top-0 left-0 right-0 z-10">
<div class="text-3xl font-headline font-black tracking-tighter text-primary">SEAL</div>
</header>
<!-- Main Content Container -->
<main class="flex-grow flex items-center justify-center p-6 mt-24 lg:mt-0">
<!-- Presentation Layout for Both States -->
<div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-16 items-start">
<!-- State A: Forgot Password Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-8 md:p-10 shadow-sm flex flex-col gap-8 relative overflow-hidden group">
<!-- Subtle decorative accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-surface-variant transition-colors duration-300"></div>
<div class="flex flex-col gap-3">
<div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-on-surface-variant text-2xl" data-icon="lock_reset">lock_reset</span>
</div>
<h1 class="text-2xl font-headline font-bold tracking-tight text-on-surface">Forgot Password</h1>
<p class="text-on-surface-variant text-sm leading-relaxed">
                        Enter the email address associated with your account, and we'll send you a secure link to reset your password.
                    </p>
</div>
<form class="flex flex-col gap-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-on-surface" for="email">Email Address</label>
<input class="px-4 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-body text-base w-full" id="email" placeholder="e.g., alan.turing@university.edu" type="email"/>
</div>
<div class="flex flex-col gap-4 mt-2">
<button class="w-full px-6 py-3.5 bg-primary text-on-primary rounded-lg font-headline font-semibold hover:bg-primary-container hover:text-on-primary-container transition-colors flex items-center justify-center gap-2" type="button">
                            Send reset link
                            <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
<a class="text-sm font-medium text-primary hover:text-on-primary-fixed-variant transition-colors flex items-center justify-center gap-1.5 w-full py-2" href="#">
<span class="material-symbols-outlined text-[16px]" data-icon="arrow_back">arrow_back</span>
                            Back to login
                        </a>
</div>
</form>
</div>
<!-- State B: Reset Password Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-8 md:p-10 shadow-sm flex flex-col gap-8 relative overflow-hidden">
<!-- Active state accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-primary"></div>
<div class="flex flex-col gap-3">
<div class="w-12 h-12 rounded-lg bg-primary-fixed flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-on-primary-fixed text-2xl" data-icon="key">key</span>
</div>
<h2 class="text-2xl font-headline font-bold tracking-tight text-on-surface">Set New Password</h2>
<p class="text-on-surface-variant text-sm leading-relaxed">
                        Your new password must be unique and adhere to the security requirements.
                    </p>
</div>
<form class="flex flex-col gap-6">
<!-- New Password Input -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-sm font-medium text-on-surface" for="new_password">New Password</label>
</div>
<div class="relative">
<input class="px-4 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-label text-base w-full pr-12" id="new_password" type="password" value="Cryptography101!"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface p-1" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Strength Indicator (State: Strong) -->
<div class="flex flex-col gap-1.5 mt-1">
<div class="flex gap-1.5 w-full">
<div class="h-1.5 rounded-full bg-secondary flex-1"></div>
<div class="h-1.5 rounded-full bg-secondary flex-1"></div>
<div class="h-1.5 rounded-full bg-secondary flex-1"></div>
</div>
<div class="flex justify-between items-center text-xs">
<span class="text-secondary font-medium">Strong password</span>
<span class="text-outline font-label">16 chars</span>
</div>
</div>
</div>
<!-- Confirm Password Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-on-surface" for="confirm_password">Confirm Password</label>
<input class="px-4 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-label text-base w-full" id="confirm_password" type="password" value="Cryptography101!"/>
</div>
<div class="flex flex-col gap-4 mt-2">
<button class="w-full px-6 py-3.5 bg-primary text-on-primary rounded-lg font-headline font-semibold hover:bg-primary/90 transition-colors flex items-center justify-center gap-2" type="button">
                            Reset Password
                            <span class="material-symbols-outlined text-[20px]" data-icon="check_circle">check_circle</span>
</button>
</div>
</form>
</div>
</div>
</main>
</body></html>
